name: flutter_vless
description: Xray/V2Ray Flutter plugin for VLESS, VMESS, Trojan, Shadowsocks, SOCKS, proxy-only, and VPN tunnel flows on Android, iOS, macOS, and Windows.

version: 1.1.1
homepage: https://tfox.dev
repository: https://github.com/XIIIFOX/flutter_vless
issue_tracker: https://github.com/XIIIFOX/flutter_vless/issues
documentation: https://github.com/XIIIFOX/flutter_vless/blob/main/doc/README.md
funding:
  - https://tfox.dev

topics:
  - vpn
  - vless
  - v2ray
  - xray
  - proxy

platforms:
  android:
  ios:
  macos:
  windows:

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_vless_platform_interface: ^1.1.0
  flutter_vless_android: ^1.1.1
  flutter_vless_macos: ^1.1.1
  flutter_vless_windows: ^1.1.0
  yaml: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

executables:
  setup_macos_vpn: setup_macos_vpn

flutter:
  plugin:
    platforms:
      android:
        default_package: flutter_vless_android
      ios:
        pluginClass: FlutterVlessPlugin
      macos:
        default_package: flutter_vless_macos
      windows:
        default_package: flutter_vless_windows

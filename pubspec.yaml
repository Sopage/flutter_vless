name: flutter_vless
description: Flutter plugin to run VLESS/VMESS as a local proxy and VPN on Android, iOS, macOS, and Windows. V2Ray/Xray core. Shadowsocks, Trojan, Socks 5 support.

version: 1.1.0
homepage: https://github.com/XIIIFOX/flutter_vless/
documentation: https://github.com/XIIIFOX/flutter_vless/blob/main/doc/README.md
tags:
     - VLESS
     - v2ray
     - xray
     - proxy
     - vpn
     - VMESS

topics:
  - vpn
  - vless
  - v2ray
  - xray
  - vmess

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_vless_platform_interface: ^1.1.0
  flutter_vless_android: ^1.1.0
  flutter_vless_macos: ^1.1.0
  flutter_vless_windows: ^1.1.0
  yaml: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

executables:
  setup_macos_vpn: setup_macos_vpn

flutter:
  plugin:
    platforms:
      android:
        default_package: flutter_vless_android
      ios:
        pluginClass: FlutterVlessPlugin
      macos:
        default_package: flutter_vless_macos
      windows:
        default_package: flutter_vless_windows

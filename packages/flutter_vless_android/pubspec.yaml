name: flutter_vless_android
description: Android implementation of the flutter_vless plugin.
version: 1.1.0
repository: https://github.com/XIIIFOX/flutter_vless
issue_tracker: https://github.com/XIIIFOX/flutter_vless/issues

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_vless_platform_interface: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    implements: flutter_vless_platform_interface
    platforms:
      android:
        package: com.github.tfox.flutter_vless
        pluginClass: FlutterVlessPlugin

name: flutter_vless_macos
description: macOS implementation of the flutter_vless plugin.
version: 1.1.2
homepage: https://tfox.dev
repository: https://github.com/XIIIFOX/flutter_vless
issue_tracker: https://github.com/XIIIFOX/flutter_vless/issues
documentation: https://github.com/XIIIFOX/flutter_vless/blob/main/doc/platform/macos.md
funding:
  - https://tfox.dev

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_vless_platform_interface: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    implements: flutter_vless_platform_interface
    platforms:
      macos:
        pluginClass: FlutterVlessPlugin
